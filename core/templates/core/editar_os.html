{% load static %}
﻿<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="{% static 'core/base.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar OS</title>
    <style>
        :root { --panel:#fff; --ink:#121212; --muted:#666; --line:#d7d7d7; --light:#f6f6f6; --dark:#0f0f0f; }
        * { box-sizing:border-box; }
        body { margin:0; padding:26px; background:linear-gradient(165deg,#f7f7f7,#ededed); color:var(--ink); font-family:"Trebuchet MS","Segoe UI",sans-serif; }
        .wrap { max-width:1080px; margin:0 auto; }
        .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
        .actions { display:flex; gap:8px; }
        h1 { margin:0; }
        .btn, button { text-decoration:none; border:1px solid #111; background:var(--dark); color:#fafafa; padding:9px 14px; border-radius:999px; font-weight:700; font-size:.86rem; cursor:pointer; }
        .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px; box-shadow:0 10px 20px rgba(0,0,0,.06); }
        form p { margin:0 0 12px; }
        input, select, textarea { width:100%; border:1px solid #cfcfcf; border-radius:8px; padding:8px; background:#fff; }
        .table-wrap { overflow:auto; }
        table { width:100%; min-width:700px; border-collapse:collapse; }
        th, td { padding:10px 11px; border-bottom:1px solid #e8e8e8; text-align:left; vertical-align:top; }
        th { background:var(--light); font-size:.78rem; text-transform:uppercase; letter-spacing:.6px; }
        .footer-actions { margin-top:14px; display:flex; gap:10px; }
        @media (max-width:760px){ body{padding:14px;} .top{flex-direction:column; align-items:flex-start;} .actions{width:100%; flex-direction:column;} .btn,button{width:100%; text-align:center;} .footer-actions{flex-direction:column;} }
    </style>
</head>
<body class="app-body">
<div class="wrap">
    <div class="top">
        <h1>Editar OS #{{ os.numero }}</h1>
        <div class="actions">
            <a class="btn" href="{% url 'home' %}">Voltar ao inicio</a>
            <a class="btn" href="{% url 'lista_os' %}">Voltar</a>
        </div>
    </div>

    <section class="panel">
        <form method="post">
            {% csrf_token %}

            <h2>Dados da OS</h2>
            {{ os_form.as_p }}

            <div class="footer-actions">
                <button type="submit">Salvar alteracoes</button>
            </div>
        </form>
        <form method="post" style="margin-top:10px;">
            {% csrf_token %}
            <button type="submit" name="excluir_os" class="btn" onclick="return confirm('Tem certeza que deseja excluir esta OS?');">Excluir OS</button>
        </form>
    </section>
</div>
</body>
</html>
