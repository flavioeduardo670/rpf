{% load static %}
﻿<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="{% static 'core/base.css' %}">
    <script defer src="{% static 'core/table_tools.js' %}"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <style>
        :root { --bg:#f3f3f3; --panel:#fff; --ink:#111; --muted:#666; --line:#d8d8d8; --dark:#0f0f0f; }
        * { box-sizing: border-box; }
        body { margin:0; min-height:100vh; display:grid; place-items:center; background:linear-gradient(165deg,#f7f7f7,#ececec); color:var(--ink); font-family:"Trebuchet MS","Segoe UI",sans-serif; padding:16px; }
        .card { width:min(460px,100%); background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:22px; box-shadow:0 10px 20px rgba(0,0,0,.06); }
        h1 { margin:0 0 14px; }
        p { color:var(--muted); margin:0 0 16px; }
        form p { margin:0 0 12px; }
        label { display:block; margin-bottom:6px; font-size:.9rem; }
        input, select { width:100%; padding:10px; border:1px solid #cfcfcf; border-radius:8px; }
        .btn { width:100%; border:1px solid #111; background:var(--dark); color:#fafafa; padding:10px 14px; border-radius:999px; font-weight:700; cursor:pointer; }
        .link { display:block; text-align:center; margin-top:14px; color:#222; text-decoration:none; }
        .errorlist { margin:0 0 10px; padding-left:18px; font-size:.88rem; }
    </style>
</head>
<body class="app-body">
    <div class="card">
        <h1>Criar cadastro</h1>
        <p>Preencha os dados para criar seu acesso.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {{ form.as_p }}
            <button class="btn" type="submit">Cadastrar</button>
        </form>
        <a class="link" href="{% url 'login' %}">Voltar para o login</a>
    </div>
</body>
</html>
