{% load static %}
<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'core/brand/favicon.svg' %}" type="image/svg+xml">
    <link rel="stylesheet" href="{% static 'core/base.css' %}">
    <link rel="stylesheet" href="{% static 'core/ui/rpf.tokens.css' %}">
    <link rel="stylesheet" href="{% static 'core/ui/rpf.components.css' %}">
    <title>Login | ERP RPF</title>
</head>
<body class="rpf-body">
    <main class="rpf-auth">
        <div class="rpf-card rpf-auth__card">
            <img class="rpf-auth__logo" src="{% static 'core/brand/rpf_logo_full.svg' %}" alt="República Portão dos Fundos">
            <h1 class="rpf-auth__title">Entrar</h1>
            <p class="rpf-auth__subtitle">Faça login para acessar o sistema.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.non_field_errors }}
                {{ form.as_p }}
                <button class="rpf-btn rpf-btn--primary" type="submit">Entrar</button>
            </form>
            <p class="rpf-auth__footer">
                <a href="{% url 'gerenciar_acessos' %}">Gerenciar acessos</a>
            </p>
        </div>
    </main>
</body>
</html>
