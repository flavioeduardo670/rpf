<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de OS</title>
    <style>
        :root { --panel:#fff; --ink:#121212; --muted:#666; --line:#d7d7d7; --light:#f6f6f6; --dark:#0f0f0f; }
        * { box-sizing:border-box; }
        body { margin:0; padding:26px; background:linear-gradient(165deg,#f7f7f7,#ededed); color:var(--ink); font-family:"Trebuchet MS","Segoe UI",sans-serif; }
        .wrap { max-width:1120px; margin:0 auto; }
        .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
        .actions { display:flex; gap:8px; }
        h1 { margin:0; }
        .btn { text-decoration:none; border:1px solid #111; background:var(--dark); color:#fafafa; padding:9px 14px; border-radius:999px; font-weight:700; font-size:.86rem; }
        .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:auto; box-shadow:0 10px 20px rgba(0,0,0,.06); }
        table { width:100%; min-width:700px; border-collapse:collapse; }
        th, td { padding:10px 11px; border-bottom:1px solid #e8e8e8; text-align:left; }
        th { background:var(--light); font-size:.78rem; text-transform:uppercase; letter-spacing:.6px; }
        .empty { color:var(--muted); text-align:center; }
        @media (max-width:760px){ body{padding:14px;} .top{flex-direction:column; align-items:flex-start;} .actions{width:100%; flex-direction:column;} .btn{width:100%; text-align:center;} }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <h1>Ordens de servico</h1>
        <div class="actions">
            <a class="btn" href="{% url 'home' %}">Voltar ao inicio</a>
            <a class="btn" href="{% url 'manutencao' %}">Voltar</a>
        </div>
    </div>

    <div class="panel">
        <table>
            <tr><th>Numero</th><th>Descricao</th><th>Status</th><th>Inicio</th><th>Fim</th><th>Acao</th></tr>
            {% for os in ordens %}
            <tr>
                <td>{{ os.numero }}</td>
                <td>{{ os.descricao }}</td>
                <td>{{ os.get_status_display }}</td>
                <td>{{ os.data_inicio }}</td>
                <td>{{ os.data_fim|default:"-" }}</td>
                <td><a class="btn" href="{% url 'editar_os' os.numero %}">Editar</a></td>
            </tr>
            {% empty %}
            <tr><td colspan="6" class="empty">Nenhuma OS registrada.</td></tr>
            {% endfor %}
        </table>
    </div>
</div>
</body>
</html>
