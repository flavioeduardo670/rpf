{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="{% static 'core/base.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar nota</title>
    <style>
        :root { --panel:#fff; --ink:#121212; --muted:#666; --line:#d7d7d7; --light:#f6f6f6; --dark:#0f0f0f; }
        * { box-sizing:border-box; }
        body { margin:0; padding:26px; background:linear-gradient(165deg,#f7f7f7,#ededed); color:var(--ink); font-family:"Trebuchet MS","Segoe UI",sans-serif; }
        .wrap { max-width:900px; margin:0 auto; }
        .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
        h1 { margin:0; }
        .btn { text-decoration:none; border:1px solid #111; background:var(--dark); color:#fafafa; padding:9px 14px; border-radius:999px; font-weight:700; font-size:.86rem; cursor:pointer; }
        .btn.light { background:#fff; color:#111; }
        .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px; box-shadow:0 10px 20px rgba(0,0,0,.06); }
        form p { margin:0 0 12px; }
        input, select, textarea { width:100%; border:1px solid #cfcfcf; border-radius:8px; padding:8px; background:#fff; }
        .actions { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; }
        @media (max-width:920px){ body{padding:14px;} .top{flex-direction:column; align-items:flex-start;} .btn{width:100%; text-align:center;} .actions{flex-direction:column;} }
    </style>
</head>
<body class="app-body">
<div class="wrap">
    <div class="top">
        <h1>Editar nota</h1>
        <a class="btn light" href="{% url 'compras' %}">Voltar</a>
    </div>

    <section class="card">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="actions">
                <button type="submit" name="excluir_submit" class="btn light" onclick="return confirm('Tem certeza que deseja excluir esta nota?');">Excluir</button>
                <a class="btn light" href="{% url 'compras' %}">Cancelar</a>
                <button type="submit" class="btn">Salvar</button>
            </div>
        </form>
    </section>
</div>
<script>
const comodoSelect = document.getElementById('id_comodo_estoque');
const localSelect = document.getElementById('id_local_estoque');
const locaisData = [
    {% for local in locais %}
    { id: {{ local.id }}, nome: "{{ local.nome|escapejs }}", comodo_id: {{ local.comodo_id|default:"null" }} },
    {% endfor %}
];

const rebuildLocais = (comodoId) => {
    if (!localSelect) return;
    const current = localSelect.value;
    localSelect.innerHTML = '';
    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = '---------';
    localSelect.appendChild(placeholder);
    locaisData
        .filter(item => String(item.comodo_id) === String(comodoId))
        .forEach(item => {
            const option = document.createElement('option');
            option.value = item.id;
            option.textContent = item.nome;
            if (String(item.id) === String(current)) {
                option.selected = true;
            }
            localSelect.appendChild(option);
        });
};

if (comodoSelect && localSelect) {
    comodoSelect.addEventListener('change', () => rebuildLocais(comodoSelect.value));
    if (comodoSelect.value) {
        rebuildLocais(comodoSelect.value);
    }
}

const categoriaSelect = document.getElementById('id_categoria_compra');
const rockField = document.getElementById('id_rock_evento');
const rockFieldWrapper = rockField ? rockField.closest('p') : null;

const toggleRockField = () => {
    if (!categoriaSelect || !rockFieldWrapper) return;
    const show = categoriaSelect.value === 'rock';
    rockFieldWrapper.style.display = show ? '' : 'none';
    if (!show) {
        rockField.value = '';
    }
};

if (categoriaSelect) {
    categoriaSelect.addEventListener('change', toggleRockField);
    toggleRockField();
}
</script>
</body>
</html>
