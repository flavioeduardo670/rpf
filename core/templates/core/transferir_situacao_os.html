{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="{% static 'core/base.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferir situação da OS</title>
    <style>
        body { margin:0; padding:26px; background:linear-gradient(165deg,#f7f7f7,#ededed); font-family:"Trebuchet MS","Segoe UI",sans-serif; }
        .wrap { max-width:860px; margin:0 auto; }
        .panel { background:#fff; border:1px solid #d7d7d7; border-radius:12px; padding:18px; box-shadow:0 10px 20px rgba(0,0,0,.06); }
        .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:10px; }
        .btn, button { text-decoration:none; border:1px solid #111; background:#0f0f0f; color:#fff; padding:9px 14px; border-radius:999px; font-weight:700; cursor:pointer; }
        form p { margin:0 0 12px; }
        input, select { width:100%; border:1px solid #cfcfcf; border-radius:8px; padding:8px; }
    </style>
</head>
<body class="app-body">
<div class="wrap">
    <div class="top">
        <h1>Transferir situação da OS #{{ os.numero }}</h1>
        <a class="btn" href="{% url 'manutencao' %}">Voltar</a>
    </div>
    <section class="panel">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Salvar transferência</button>
        </form>
    </section>
</div>
</body>
</html>
