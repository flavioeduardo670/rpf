name: Homologacao e Deploy Staging

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      operation:
        description: "Operacao manual"
        required: true
        default: "deploy_staging"
        type: choice
        options:
          - deploy_staging
          - rollback

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint e checks basicos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar sintaxe (compileall)
        run: python -m compileall core rpf

      - name: Django system check
        run: python manage.py check

  testes:
    name: Testes automatizados
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar testes
        run: python manage.py test

  deploy_staging:
    name: Deploy em staging
    runs-on: ubuntu-latest
    needs: testes
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'deploy_staging')
    environment: staging
    steps:
      - name: Deploy da aplicacao em staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.STAGING_APP_PATH }}"
            git fetch --all --prune
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"
            source "${{ secrets.STAGING_VENV_ACTIVATE }}"
            pip install -r requirements.txt
            sudo systemctl restart "${{ secrets.STAGING_APP_SERVICE }}"

  migracoes_staging:
    name: Migracoes em staging
    runs-on: ubuntu-latest
    needs: deploy_staging
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'deploy_staging')
    environment: staging
    steps:
      - name: Rodar migrate --noinput em staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.STAGING_APP_PATH }}"
            source "${{ secrets.STAGING_VENV_ACTIVATE }}"
            export DJANGO_SETTINGS_MODULE="${{ secrets.STAGING_DJANGO_SETTINGS_MODULE }}"
            export DJANGO_SECRET_KEY="${{ secrets.STAGING_DJANGO_SECRET_KEY }}"
            export DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}"
            python manage.py migrate --noinput

  smoke_tests:
    name: Smoke tests em staging
    runs-on: ubuntu-latest
    needs: migracoes_staging
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'deploy_staging')
    steps:
      - name: Validar endpoints criticos
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          set -e
          test -n "$STAGING_BASE_URL"
          curl -fsS "$STAGING_BASE_URL/"
          curl -fsS "$STAGING_BASE_URL/login/"
          curl -fsS "$STAGING_BASE_URL/financeiro/"

  rollback_operacional:
    name: Rollback operacional (app + banco)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'rollback'
    environment: staging
    steps:
      - name: Rollback da aplicacao para versao estavel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.STAGING_APP_PATH }}"
            ${{ secrets.ROLLBACK_APP_COMMAND }}

      - name: Procedimento de rollback do banco
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.STAGING_APP_PATH }}"
            ${{ secrets.ROLLBACK_DB_COMMAND }}
